<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Campus Events</title>

    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="destination.html">Destinations</a></li>
                <li><a href="packages.html">Packages</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Contact Us</h1>
        <p>Feel free to reach out to Ahmad's Team for any tourism queries!</p>
        
        <form id="contact-form">
            <div style="margin-bottom: 10px;">
                <input type="text" placeholder="Your Name" required style="padding: 8px; width: 80%;">
            </div>
            <div style="margin-bottom: 10px;">
                <input type="email" placeholder="Your Email" required style="padding: 8px; width: 80%;">
            </div>
            <div style="margin-bottom: 10px;">
                <textarea placeholder="Your Message" rows="4" style="padding: 8px; width: 80%;"></textarea>
            </div>
            <button type="submit" style="background: #2496ed; color: white; border: none; padding: 10px 20px; cursor: pointer;">Send Message</button>
        </form>

        <div class="social-links" style="margin-top: 20px;">
            <h3>Follow Us</h3>
            <p>GitHub | LinkedIn | Twitter</p>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Campus Events Team. All rights reserved.</p>
    </footer>
</body>
